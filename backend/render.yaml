services:
  - type: web
    name: crafty-closet-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in the Render dashboard → Environment tab:
      # MYSQL_URL          = mysql://avnadmin:PASSWORD@HOST:PORT/defaultdb?ssl-mode=REQUIRED
      # FIREBASE_SERVICE_ACCOUNT = <base64-encoded service account JSON>
      # CLIENT_URL         = https://crafty-closet-5dc41.web.app
      # MAIL_HOST          = smtp.gmail.com
      # MAIL_PORT          = 587
      # MAIL_USER          = avu0000001@gmail.com
      # MAIL_PASS          = <your app password>
      # MAIL_FROM          = "Crafty Closet <avu0000001@gmail.com>"
